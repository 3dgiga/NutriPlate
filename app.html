<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriPlate app</title>
  <style>
    :root{
      --bg:#f5f5f5;
      --white:#ffffff;
      --text:#202124;
      --muted:#8f8f8f;
      --line:#eeeeee;
      --cal:#ff9f43;
      --carb:#f5cf35;
      --protein:#45a9ee;
      --fat:#6fca68;
      --dark:#222222;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      display:flex;
      justify-content:center;
      min-height:100vh;
    }
    .app{
      width:100%;
      max-width:430px;
      min-height:100vh;
      background:#fff;
      overflow:hidden;
    }
    .status{
      height:34px;
      padding:10px 22px 0;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:13px;
      font-weight:700;
    }
    .status-icons{display:flex;align-items:center;gap:5px}
    .signal{display:flex;gap:2px;align-items:end;height:12px}
    .signal span{width:3px;background:#111;border-radius:2px}.signal span:nth-child(1){height:4px}.signal span:nth-child(2){height:7px}.signal span:nth-child(3){height:10px}
    .wifi{width:14px;height:10px;border-top:3px solid #111;border-radius:50% 50% 0 0}
    .battery{width:23px;height:11px;border:2px solid #111;border-radius:3px;position:relative}.battery:after{content:"";position:absolute;right:-5px;top:2px;width:3px;height:5px;background:#111;border-radius:1px}

    .tabs{
      height:54px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      border-bottom:1px solid var(--line);
      align-items:end;
    }
    .tab{
      border:0;
      background:transparent;
      padding:0 0 15px;
      font-size:16px;
      font-weight:800;
      color:#232323;
      position:relative;
      cursor:pointer;
    }
    .tab.active:after{
      content:"";
      position:absolute;
      left:50%;
      bottom:-1px;
      transform:translateX(-50%);
      width:58px;
      height:2px;
      background:#35c9c1;
      border-radius:2px;
    }
    .screen{display:none;padding:24px 26px 32px}.screen.active{display:block}

    .brand{text-align:center;margin:4px 0 20px}.logo{width:116px;height:116px;object-fit:cover;border-radius:50%;display:block;margin:0 auto 12px;background:#f8f8f8}.brand h1{margin:0;font-size:29px;font-weight:800}.brand p{margin:7px 0 0;color:var(--muted);font-size:14px}

    .hero-number{text-align:center;margin:12px 0 22px}.hero-number b{font-size:38px;font-weight:500}.hero-number span{font-size:16px;color:var(--muted);margin-left:3px}.hero-number small{display:block;color:var(--muted);margin-top:4px;font-size:13px}
    .macro{margin:20px 0}.macro-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:10px}.macro label{font-size:21px;font-weight:300;color:#6a6a6a}.macro strong{font-size:22px;font-weight:300;color:#333}.track{height:25px;background:#ededf2;border-radius:20px;overflow:hidden}.fill{height:100%;border-radius:20px;width:0;transition:.25s}.cal{background:var(--cal)}.carb{background:var(--carb)}.protein{background:var(--protein)}.fat{background:var(--fat)}

    .row{display:grid;grid-template-columns:1fr 82px 48px;gap:10px;align-items:start}.search{position:relative}.field{width:100%;height:48px;border:1px solid var(--line);border-radius:16px;background:#fafafa;padding:0 14px;font-size:15px;outline:none}.field:focus{background:#fff;border-color:#d4d4d4}.food-field{padding-right:42px}.arrow-btn{position:absolute;right:6px;top:6px;width:36px;height:36px;border:0;border-radius:12px;background:#f0f0f0;color:#555;font-size:18px;line-height:36px;cursor:pointer}.arrow-btn.open{transform:rotate(180deg)}.plus{height:48px;border:0;border-radius:16px;background:#222;color:#fff;font-size:28px;cursor:pointer}.menu{display:none;position:absolute;top:54px;left:0;right:0;max-height:260px;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 16px 34px rgba(0,0,0,.08);z-index:4}.menu.open{display:block}.menu button{width:100%;border:0;border-bottom:1px solid #f3f3f3;background:#fff;text-align:left;padding:13px 14px;font-size:15px;color:#222}.menu button:last-child{border-bottom:0}.menu button:active{background:#f7f7f7}

    .plate-panel{
      margin-top:18px;
      padding:16px;
      border-radius:22px;
      background:linear-gradient(180deg,#fff8e8 0%,#f5fbff 52%,#f2fbf0 100%);
      border:1px solid #f3f3f3;
    }
    .mini-title{font-size:13px;color:#777;margin:0 0 12px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.card{border-radius:18px;padding:14px 12px;min-height:74px}.card span{display:block;font-size:12px;margin-bottom:6px;color:#777}.card b{font-size:21px;font-weight:700}.card.cal-card{background:#fff0df;color:#d86b00}.card.carb-card{background:#fff7c7;color:#a98500}.card.protein-card{background:#e7f5ff;color:#167abd}.card.fat-card{background:#eaf9e7;color:#328c2e}
    .list{margin-top:18px;border-top:1px solid var(--line);padding-top:12px}.empty{font-size:14px;color:#999;text-align:center;padding:22px 0}.item{display:flex;justify-content:space-between;gap:12px;align-items:center;border-bottom:1px solid #f3f3f3;padding:12px 0}.item:last-child{border-bottom:0}.item b{font-size:15px;font-weight:600}.item span{display:block;color:#999;font-size:13px;margin-top:2px}.remove{border:0;background:#f3f3f3;width:34px;height:34px;border-radius:13px;font-size:18px;color:#777}
    .primary,.secondary{width:100%;border:0;border-radius:18px;height:50px;font-size:16px;margin-top:15px;cursor:pointer}.primary{background:#222;color:#fff;font-weight:800}.secondary{background:#f4f4f4;color:#333}

    .week{height:210px;display:flex;align-items:flex-end;gap:13px;border-bottom:1px solid var(--line);padding-top:20px;margin-bottom:24px}.day{flex:1;text-align:center}.stack{height:150px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:8px}.bar-v{width:27px;display:flex;flex-direction:column-reverse;border-radius:5px 5px 0 0;overflow:hidden;background:#f5f5f5}.seg{width:100%}.day small{font-size:14px;color:#777}.legend{margin:20px 0}.legend div{display:flex;align-items:center;gap:14px;margin:24px 0;font-size:21px;font-weight:300}.dot{width:28px;height:28px;border-radius:50%}.history-card{border-bottom:1px solid #f1f1f1;padding:14px 0}.history-card h3{margin:0 0 5px;font-size:16px}.history-card p{margin:0;color:#888;font-size:13px}.actions{display:flex;gap:8px;margin-top:10px}.actions button{border:0;background:#f4f4f4;border-radius:13px;padding:9px 12px;color:#333}
    @media(max-width:360px){.screen{padding-left:20px;padding-right:20px}.row{grid-template-columns:1fr 75px 45px}.macro label{font-size:19px}.macro strong{font-size:20px}.grid{gap:8px}.card{padding:12px 10px}}
  </style>
</head>
<body>
  <main class="app">
    <div class="status"><span id="clock">6:01</span><div class="status-icons"><div class="signal"><span></span><span></span><span></span></div><div class="wifi"></div><div class="battery"></div></div></div>
    <nav class="tabs">
      <button class="tab active" data-tab="resumo">Resumo</button>
      <button class="tab" data-tab="detalhes">Detalhes</button>
      <button class="tab" data-tab="historico">Histórico</button>
    </nav>

    <section id="resumo" class="screen active">
      <div class="brand">
        <img class="logo" src="logo.jpg" alt="Logo NutriPlate" onerror="this.style.display='none'" />
        <h1>NutriPlate</h1>
        <p>Resumo da refeição</p>
      </div>
      <div class="hero-number"><b id="summaryCalories">0</b><span>kcal</span><small><span id="summaryWeight">0</span>g no prato</small></div>
      <div class="macro"><div class="macro-top"><label>Calorias</label><strong id="sumCalories">0 kcal</strong></div><div class="track"><div id="barCalories" class="fill cal"></div></div></div>
      <div class="macro"><div class="macro-top"><label>Carboidrato</label><strong id="sumCarb">0g</strong></div><div class="track"><div id="barCarb" class="fill carb"></div></div></div>
      <div class="macro"><div class="macro-top"><label>Proteína</label><strong id="sumProtein">0g</strong></div><div class="track"><div id="barProtein" class="fill protein"></div></div></div>
      <div class="macro"><div class="macro-top"><label>Gorduras</label><strong id="sumFat">0g</strong></div><div class="track"><div id="barFat" class="fill fat"></div></div></div>
    </section>

    <section id="detalhes" class="screen">
      <div class="row">
        <div class="search">
          <input id="foodSearch" class="field food-field" type="text" placeholder="Pesquisar alimento" autocomplete="off" />
          <button id="arrowFood" class="arrow-btn" type="button">⌄</button>
          <div id="foodMenu" class="menu"></div>
        </div>
        <input id="grams" class="field" type="number" min="1" value="100" placeholder="g" />
        <button id="addFood" class="plus">+</button>
      </div>

      <div class="list">
        <p class="mini-title">Alimentos no prato</p>
        <div id="items"></div>
      </div>

      <div class="plate-panel">
        <p class="mini-title">Nutrientes do prato</p>
        <div class="grid">
          <div class="card cal-card"><span>Calorias</span><b id="tCal">0</b></div>
          <div class="card carb-card"><span>Carboidrato</span><b id="tCarb">0g</b></div>
          <div class="card protein-card"><span>Proteína</span><b id="tProtein">0g</b></div>
          <div class="card fat-card"><span>Gorduras</span><b id="tFat">0g</b></div>
        </div>
      </div>

      <button id="finishMeal" class="primary">Concluir prato</button>
      <button id="clearMeal" class="secondary">Limpar prato</button>
    </section>

    <section id="historico" class="screen">
      <div class="week" id="week"></div>
      <div class="legend">
        <div><span class="dot protein"></span>Carboidratos</div>
        <div><span class="dot fat"></span>Gorduras</div>
        <div><span class="dot carb"></span>Proteínas</div>
      </div>
      <div id="historyList"></div>
    </section>
  </main>

    const $ = selector => document.querySelector(selector);
    let selected = null;
    let items = JSON.parse(localStorage.getItem('nutriPlateItems') || '[]');

    let editing = localStorage.getItem('nutriPlateEditing') || '';

    function fmt(value){
      const n = Math.round((Number(value) + Number.EPSILON) * 10) / 10;
      return Number.isInteger(n) ? String(n) : String(n).replace('.', ',');
    }
    function calc(food, grams){
      const m = grams / 100;
      return {cal:food.cal*m, carb:food.carb*m, protein:food.protein*m, fat:food.fat*m, grams};
    }
    function total(list = items){
      return list.reduce((a,i)=>({
        cal:a.cal+i.n.cal,
        carb:a.carb+i.n.carb,
        protein:a.protein+i.n.protein,
        fat:a.fat+i.n.fat,
        grams:a.grams+i.grams
      }), {cal:0, carb:0, protein:0, fat:0, grams:0});
    }
    function save(){
      localStorage.setItem('nutriPlateItems', JSON.stringify(items));
      localStorage.setItem('nutriPlateHistory', JSON.stringify(history));
      editing ? localStorage.setItem('nutriPlateEditing', editing) : localStorage.removeItem('nutriPlateEditing');
    }

    document.querySelectorAll('.tab').forEach(button => {
      button.addEventListener('click', () => openTab(button.dataset.tab));
    });
    function openTab(tab){
      document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      document.querySelectorAll('.screen').forEach(s => s.classList.toggle('active', s.id === tab));
      if(tab === 'historico') renderHistory();
    }

    function showMenu(forceAll = false){
      const q = $('#foodSearch').value.trim().toLowerCase();
      const list = foods
        .filter(f => forceAll || !q || f.name.toLowerCase().includes(q))
        .sort((a,b) => a.name.localeCompare(b.name, 'pt-BR'))
        .slice(0, 80);
      $('#foodMenu').innerHTML = list.length ? list.map(f => `
        <button type="button" data-food="${f.name}">${f.name}</button>
      `).join('') : '<button type="button">Nenhum alimento encontrado</button>';
      $('#foodMenu').classList.add('open');
      $('#arrowFood').classList.add('open');
    }

      $('#foodMenu').classList.remove('open');
      $('#arrowFood').classList.remove('open');
    }
    $('#foodSearch').addEventListener('focus', () => showMenu());
    $('#foodSearch').addEventListener('input', () => { selected = null; showMenu(); });
    $('#arrowFood').addEventListener('click', event => {
      event.stopPropagation();
      if($('#foodMenu').classList.contains('open')) hideMenu();
      else { $('#foodSearch').focus(); showMenu(true); }
    });
    $('#foodMenu').addEventListener('click', event => {
      const button = event.target.closest('[data-food]');
      if(!button) return;
      selected = foods.find(f => f.name === button.dataset.food);
      $('#foodSearch').value = selected.name;
      hideMenu();
    });
    document.addEventListener('click', event => {
      if(!event.target.closest('.search')) hideMenu();
    });

    function getTypedFood(){
      const q = $('#foodSearch').value.trim().toLowerCase();
      return selected || foods.find(f => f.name.toLowerCase() === q) || foods.find(f => f.name.toLowerCase().includes(q));
    }

    $('#addFood').addEventListener('click', () => {
      const food = getTypedFood();
      const grams = Math.max(1, Number($('#grams').value || 0));
      if(!food){ alert('Escolha um alimento da lista.'); return; }
      items.push({id:Date.now()+Math.random(), name:food.name, grams, n:calc(food, grams)});
      selected = null;
      $('#foodSearch').value = '';
      $('#grams').value = 100;
      hideMenu();
      save(); renderAll();
    });

    function renderItems(){
      $('#items').innerHTML = items.length ? items.map(item => `
        <div class="item">
          <div><b>${item.name}</b><span>${fmt(item.grams)}g</span></div>
          <button class="remove" data-remove="${item.id}">×</button>
        </div>
      `).join('') : '<div class="empty">Adicione alimentos com o botão +</div>';
      document.querySelectorAll('[data-remove]').forEach(button => {
        button.onclick = () => {
          items = items.filter(item => String(item.id) !== String(button.dataset.remove));
          save(); renderAll();
        };
      });
    }
    function renderTotals(){
      const t = total();
      $('#tCal').textContent = fmt(t.cal);
      $('#tCarb').textContent = fmt(t.carb) + 'g';
      $('#tProtein').textContent = fmt(t.protein) + 'g';
      $('#tFat').textContent = fmt(t.fat) + 'g';

      const base = items.length ? t : (history[0]?.totals || t);
      $('#summaryCalories').textContent = fmt(base.cal || 0);
      $('#summaryWeight').textContent = fmt(base.grams || 0);
      $('#sumCalories').textContent = fmt(base.cal || 0) + ' kcal';
      $('#sumCarb').textContent = fmt(base.carb || 0) + 'g';
      $('#sumProtein').textContent = fmt(base.protein || 0) + 'g';
      $('#sumFat').textContent = fmt(base.fat || 0) + 'g';
      $('#barCalories').style.width = Math.min(100, (base.cal || 0) / 900 * 100) + '%';
      $('#barCarb').style.width = Math.min(100, (base.carb || 0) / 180 * 100) + '%';
      $('#barProtein').style.width = Math.min(100, (base.protein || 0) / 120 * 100) + '%';
      $('#barFat').style.width = Math.min(100, (base.fat || 0) / 70 * 100) + '%';
      $('#finishMeal').textContent = editing ? 'Atualizar prato' : 'Concluir prato';
    }

    $('#finishMeal').addEventListener('click', () => {
      if(!items.length){ alert('Adicione pelo menos um alimento.'); return; }
      const meal = {id: editing || String(Date.now()), date:new Date().toISOString(), items, totals:total()};
      if(editing){ history = history.map(h => String(h.id) === String(editing) ? meal : h); }
      else{ history.unshift(meal); }
      items = []; editing = '';
      save(); renderAll(); openTab('historico');
    });
    $('#clearMeal').addEventListener('click', () => {
      items = []; editing = '';
      save(); renderAll();
    });

    function renderHistory(){
      const labels = ['seg','ter','qua','qui','sex','sáb','dom'];
      const week = labels.map(label => ({label, carb:0, protein:0, fat:0}));
      history.forEach(meal => {
        const d = new Date(meal.date);
        const idx = (d.getDay() + 6) % 7;
        week[idx].carb += meal.totals.carb;
        week[idx].protein += meal.totals.protein;
        week[idx].fat += meal.totals.fat;
      });
      const max = Math.max(1, ...week.map(d => d.carb + d.protein + d.fat));
      $('#week').innerHTML = week.map(d => {
        const totalMacro = d.carb + d.protein + d.fat;
        const height = Math.max(8, totalMacro / max * 150);
        const carb = totalMacro ? d.carb / totalMacro * 100 : 0;
        const protein = totalMacro ? d.protein / totalMacro * 100 : 0;
        const fat = totalMacro ? d.fat / totalMacro * 100 : 0;
        return `<div class="day"><div class="stack"><div class="bar-v" style="height:${height}px"><div class="seg protein" style="height:${carb}%"></div><div class="seg carb" style="height:${protein}%"></div><div class="seg fat" style="height:${fat}%"></div></div></div><small>${d.label}</small></div>`;
      }).join('');

      $('#historyList').innerHTML = history.length ? history.map(meal => {
        const d = new Date(meal.date).toLocaleDateString('pt-BR');
        const names = meal.items.map(i => i.name).slice(0, 3).join(', ');
        return `<div class="history-card"><h3>${fmt(meal.totals.cal)} kcal · ${fmt(meal.totals.grams)}g</h3><p>${d} · ${names}${meal.items.length > 3 ? '...' : ''}</p><div class="actions"><button data-edit="${meal.id}">Editar</button><button data-delete="${meal.id}">Excluir</button></div></div>`;
      }).join('') : '<div class="empty">Nenhum prato concluído ainda</div>';
      document.querySelectorAll('[data-edit]').forEach(button => {
        button.onclick = () => {
          const meal = history.find(h => String(h.id) === String(button.dataset.edit));
          if(!meal) return;
          items = JSON.parse(JSON.stringify(meal.items));
          editing = String(meal.id);
          save(); renderAll(); openTab('detalhes');
        };
      });
      document.querySelectorAll('[data-delete]').forEach(button => {
        button.onclick = () => {
          history = history.filter(h => String(h.id) !== String(button.dataset.delete));
          save(); renderAll();
        };
      });
    }

    function renderAll(){ renderItems(); renderTotals(); renderHistory(); }
    function tick(){ $('#clock').textContent = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}); }
    tick(); setInterval(tick, 30000); renderAll();
  </script>
